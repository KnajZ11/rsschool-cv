<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Planning Tool</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>HR Planning Tool</h1>
      <div id="month-selector-container">
        <!-- Сюда вставится селект из MonthSelector.ts -->
      </div>
    </header>

    <!-- Финансовый баннер -->
    <div class="profit-banner">
      Прибыль месяца: <span id="total-profit" class="positive">0 $</span>
    </div>

    <!-- Кнопки действий -->
    <div class="actions">
      <button id="add-employee-btn">➕ Добавить сотрудника</button>
      <button id="add-project-btn">💼 Добавить проект</button>
    </div>

    <!-- Основной контент: две колонки -->
    <main class="lists-wrapper">
      <section>
        <h3>Команда</h3>
        <div id="employee-list">
          <!-- Сюда рендерятся сотрудники -->
        </div>
      </section>

      <section>
        <h3>Проекты</h3>
        <div id="project-list">
          <!-- Сюда рендерятся проекты -->
        </div>
      </section>
    </main>
  </div>

  <!-- Модальное окно (одно общее для всех форм) -->
  <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div class="modal">
      <div id="modal-content"></div>
      <div class="modal-actions">
        <button id="modal-close" class="btn-delete">Закрыть</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
