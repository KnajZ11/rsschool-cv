<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outsource Dashboard - RSSchool</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="header-main">
        <h1>Outsource Dashboard</h1>
        <!-- Контейнер для MonthSelector.ts (там должен быть селект и кнопка Copy) -->
        <div id="month-selector-container"></div>
      </div>
      
      <!-- Финансовый баннер вынесен в header для лучшей видимости по ТЗ -->
      <div class="profit-banner">
        Итоговая прибыль: <span id="total-profit">0 $</span>
      </div>
    </header>

    <nav class="actions-bar">
      <button id="add-employee-btn" class="btn-primary">➕ Добавить сотрудника</button>
      <button id="add-project-btn" class="btn-primary">💼 Добавить проект</button>
    </nav>

    <main class="dashboard-grid">
      <!-- Секция сотрудников -->
      <section class="list-section">
        <div class="section-header">
          <h3>Команда</h3>
        </div>
        <div id="employee-list" class="table-container">
          <!-- Сюда EmployeeList.ts вставит таблицу -->
        </div>
      </section>

      <!-- Секция проектов -->
      <section class="list-section">
        <div class="section-header">
          <h3>Проекты</h3>
        </div>
        <div id="project-list" class="table-container">
          <!-- Сюда ProjectList.ts вставит таблицу -->
        </div>
      </section>
    </main>
  </div>

  <!-- Модальное окно -->
  <div id="modal-overlay" class="modal-overlay" style="display: none;">
    <div class="modal-window">
      <!-- Контент формы (EmployeeForm, CapacityEditor и т.д.) -->
      <div id="modal-content"></div>
      
      <div class="modal-footer">
        <button id="modal-close" class="btn-secondary">Закрыть</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
